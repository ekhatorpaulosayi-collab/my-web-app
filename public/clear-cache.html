<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Updating Storehouse - Please Wait</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #FF3366 0%, #FF6B6B 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 500px;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.1rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-top: 1rem;
        }
        .success {
            color: #4CAF50;
            font-size: 3rem;
            margin: 1rem 0;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: white;
            color: #FF3366;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 1rem;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 Updating Storehouse</h1>
        <p>We're getting you the latest version...</p>
        <div class="spinner"></div>
        <div class="status" id="status">Clearing old cache...</div>
    </div>

    <script>
        (async function() {
            const statusEl = document.getElementById('status');
            const container = document.querySelector('.container');

            try {
                // Step 1: Unregister all service workers
                statusEl.textContent = 'Removing old service workers...';
                if ('serviceWorker' in navigator) {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    for (let registration of registrations) {
                        await registration.unregister();
                    }
                }

                // Step 2: Clear all caches
                statusEl.textContent = 'Clearing application cache...';
                if ('caches' in window) {
                    const cacheNames = await caches.keys();
                    await Promise.all(
                        cacheNames.map(cacheName => caches.delete(cacheName))
                    );
                }

                // Step 3: Clear localStorage and sessionStorage
                statusEl.textContent = 'Cleaning up local data...';
                try {
                    // Preserve essential data
                    const hasVisited = localStorage.getItem('hasVisited');
                    const authData = localStorage.getItem('supabase.auth.token');

                    localStorage.clear();
                    sessionStorage.clear();

                    // Restore essential data
                    if (hasVisited) localStorage.setItem('hasVisited', hasVisited);
                    if (authData) localStorage.setItem('supabase.auth.token', authData);
                } catch (e) {
                    console.log('Storage clear partial:', e);
                }

                // Step 4: Success!
                statusEl.textContent = 'Update complete!';

                // Show success message
                container.innerHTML = `
                    <div class="success">✓</div>
                    <h1>Update Complete!</h1>
                    <p>Storehouse has been updated to the latest version.</p>
                    <a href="/?v=${Date.now()}" class="btn">Open Storehouse</a>
                    <div class="status">Redirecting in 3 seconds...</div>
                `;

                // Auto-redirect after 3 seconds
                setTimeout(() => {
                    window.location.href = `/?v=${Date.now()}`;
                }, 3000);

            } catch (error) {
                console.error('Cache clear error:', error);
                statusEl.textContent = 'Update failed, but redirecting anyway...';
                setTimeout(() => {
                    window.location.href = `/?v=${Date.now()}`;
                }, 2000);
            }
        })();
    </script>
</body>
</html>
